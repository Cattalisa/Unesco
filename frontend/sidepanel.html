<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0b0f19;
      --bg-card: rgba(22, 30, 49, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-light: #f1f5f9;
      --text-muted: #64748b;
      
      /* Severity Colors */
      --color-low: #10b981;
      --color-mid: #f59e0b;
      --color-high: #ef4444;
      --color-primary: #06b6d4;
    }
    
    body {
      font-family: 'Outfit', sans-serif;
      margin: 0;
      padding: 20px;
      background-color: var(--bg-dark);
      color: var(--text-light);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }
    
    body::-webkit-scrollbar {
      width: 6px;
    }
    body::-webkit-scrollbar-thumb {
      background-color: rgba(255,255,255,0.1);
      border-radius: 3px;
    }

    h1 {
      font-size: 18px;
      font-weight: 800;
      margin-top: 0;
      margin-bottom: 20px;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .logo-badge {
      font-size: 10px;
      background: linear-gradient(135deg, #38bdf8, #06b6d4);
      color: #0b0f19;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 700;
    }

    .btn-scan-header {
      background: rgba(6, 182, 212, 0.1);
      border: 1px solid rgba(6, 182, 212, 0.3);
      color: var(--color-primary);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-left: auto;
    }
    .btn-scan-header:hover {
      background: rgba(6, 182, 212, 0.2);
      border-color: var(--color-primary);
    }
    .btn-scan-header:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Score Ring Container */
    .score-container {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(8px);
    }
    
    .score-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
    }

    .score-ring-container {
      position: relative;
      width: 120px;
      height: 120px;
    }

    .score-ring {
      transform: rotate(-90deg);
    }

    .score-ring-bg {
      stroke: rgba(255, 255, 255, 0.05);
    }

    .score-ring-fill {
      transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .score-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      display: flex;
      flex-direction: column;
    }

    #score-number {
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
      color: var(--text-light);
    }

    .score-total {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    
    .score-label {
      margin-top: 15px;
      font-size: 14px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      background-color: rgba(255,255,255,0.05);
    }

    /* Cards */
    .card-list-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      padding-left: 2px;
    }

    .card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      border-left: 4px solid var(--color-primary);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(8px);
    }
    
    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.15);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
    }
    
    .card.selected {
      background-color: rgba(6, 182, 212, 0.08);
      border-color: var(--color-primary);
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.15);
    }

    .tech-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .tech-title {
      font-weight: 700;
      font-size: 14px;
      color: var(--text-light);
      letter-spacing: 0.3px;
    }
    
    .tech-badge {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    .tech-quote {
      font-style: italic;
      color: #94a3b8;
      font-size: 12px;
      margin-bottom: 12px;
      background-color: rgba(0,0,0,0.2);
      padding: 10px;
      border-left: 2px solid var(--color-primary);
      border-radius: 0 6px 6px 0;
      line-height: 1.4;
    }

    .tech-desc {
      font-size: 13px;
      margin-bottom: 12px;
      color: #cbd5e1;
      line-height: 1.5;
    }

    .tech-tip {
      font-size: 12px;
      background-color: rgba(6, 182, 212, 0.04);
      border: 1px dashed rgba(6, 182, 212, 0.2);
      padding: 10px;
      border-radius: 8px;
      color: #94d8f6;
      line-height: 1.4;
    }

    .tip-label {
      font-weight: 700;
      color: var(--color-primary);
      margin-right: 4px;
    }

    #no-data {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--text-muted);
      margin-top: 80px;
      padding: 20px;
    }
    
    .no-data-icon {
      font-size: 48px;
      margin-bottom: 15px;
      opacity: 0.5;
    }
    
    .no-data-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-light);
      margin-bottom: 8px;
    }
    
    .no-data-desc {
      font-size: 12px;
      line-height: 1.5;
      max-width: 220px;
      margin-bottom: 20px;
    }

    .btn-scan {
      background: linear-gradient(135deg, #0284c7, #06b6d4);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(6, 182, 212, 0.2);
    }
    .btn-scan:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(6, 182, 212, 0.4);
    }
    .btn-scan:active {
      transform: translateY(1px);
    }
    .btn-scan:disabled {
      background: var(--text-muted);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top-color: var(--color-primary);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <h1>
    <span class="logo-badge">MIL</span>
    MindGuard Report
    <button id="header-scan-btn" class="btn-scan-header">Scan Page</button>
  </h1>
  
  <div id="content-area" style="display:none;">
    <div class="score-container">
      <div class="score-title">Manipulation Risk</div>
      <div class="score-ring-container">
        <svg class="score-ring" width="120" height="120">
          <circle class="score-ring-bg" cx="60" cy="60" r="52" stroke-width="6" fill="transparent"/>
          <circle class="score-ring-fill" id="score-circle" cx="60" cy="60" r="52" stroke-width="6" stroke-linecap="round" fill="transparent" stroke-dasharray="326.7" stroke-dashoffset="326.7"/>
        </svg>
        <div class="score-text">
          <span id="score-number">0</span>
          <span class="score-total">/100</span>
        </div>
      </div>
      <div id="score-label" class="score-label">Neutral</div>
    </div>
    
    <div class="card-list-title">Detected Tactics</div>
    <div id="manipulation-list"></div>
  </div>
  
  <div id="no-data">
    <div class="no-data-icon">🛡️</div>
    <div class="no-data-title">Awaiting Analysis</div>
    <div class="no-data-desc">Click the button below to run the media literacy checker on this page.</div>
    <button id="sidepanel-scan-btn" class="btn-scan">Scan Current Page</button>
    <div class="spinner" id="sidepanel-spinner" style="display:none; margin-top: 15px;"></div>
    <div id="sidepanel-status" style="font-size: 12px; margin-top: 15px; color: var(--text-muted); text-align: center;"></div>
  </div>
  
  <script src="sidepanel.js"></script>
</body>
</html>
