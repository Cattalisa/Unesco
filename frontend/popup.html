<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-card: rgba(30, 41, 59, 0.7);
      --primary: #06b6d4;
      --primary-hover: #0891b2;
      --text-light: #f8fafc;
      --text-muted: #94a3b8;
    }
    body {
      width: 280px;
      font-family: 'Outfit', sans-serif;
      margin: 0;
      padding: 20px;
      background-color: var(--bg-dark);
      color: var(--text-light);
      overflow: hidden;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-icon {
      width: 24px;
      height: 24px;
      border-radius: 4px;
    }
    h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, #38bdf8, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tagline {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      margin-top: -10px;
      margin-bottom: 5px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      background: linear-gradient(135deg, #0284c7, #06b6d4);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(6, 182, 212, 0.2);
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(6, 182, 212, 0.4);
      background: linear-gradient(135deg, #0369a1, #0891b2);
    }
    .btn:active {
      transform: translateY(1px);
    }
    #status {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      min-height: 18px;
      transition: all 0.3s ease;
      width: 100%;
    }
    /* Loading Spinner */
    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top-color: var(--primary);
      animation: spin 0.8s linear infinite;
      margin: 5px auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .status-text {
      font-size: 12px;
      font-weight: 400;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <img src="assets/icon48.png" class="logo-icon" alt="MindGuard logo">
      <h2>MindGuard</h2>
    </div>
    <div class="tagline">AI Media Literacy Companion</div>
    <button id="analyze-btn" class="btn">Scan Current Page</button>
    <div class="spinner" id="loading-spinner"></div>
    <div id="status"><span class="status-text">Ready to scan for manipulation</span></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
